<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Trivial Pursuit of a Startup Idea</title>
<style>
  :root{
    --blue:#1f7ae0; --pink:#e85aa0; --green:#2fab63; --yellow:#f2b705; --brown:#8a5a3c; --orange:#f2792b;
    --bg:#0e1116; --panel:#171c24; --panel2:#1f2630; --line:#2b3440; --ink:#e9eef5; --muted:#9aa7b6;
    --good:#2fab63; --bad:#e85a5a;
    --radius:16px; --shadow:0 10px 30px rgba(0,0,0,.35);
    --font: "Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:radial-gradient(1200px 600px at 50% -10%, #1b2330, #0e1116 60%);color:var(--ink);font-family:var(--font);}
  a{color:var(--blue)}
  .wrap{max-width:1180px;margin:0 auto;padding:18px 20px 80px;}
  header.app{display:flex;align-items:center;gap:16px;padding:12px 0 18px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:12px}
  .logo h1{font-size:18px;margin:0;letter-spacing:.2px}
  .logo p{margin:0;font-size:12px;color:var(--muted)}
  .spacer{flex:1}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .btn{cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink);padding:10px 16px;border-radius:12px;font-size:14px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:8px}
  .btn:hover{border-color:#3a4654;transform:translateY(-1px)}
  .btn.primary{background:linear-gradient(180deg,#2b6fe0,#1f5ec2);border-color:#2b6fe0;color:#fff}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 11px;font-size:12px;border-radius:9px}
  .btn.good{background:linear-gradient(180deg,#34b86c,#249a56);border-color:#2fab63;color:#fff}
  .btn.bad{background:transparent;border-color:#5a2b2b;color:#ff9d9d}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:22px}
  .muted{color:var(--muted)}
  .center{text-align:center}
  h2{margin:0 0 6px;font-size:24px}
  h3{margin:0 0 4px;font-size:16px}
  input,textarea,select{font-family:var(--font);background:#0f141b;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 13px;font-size:14px;width:100%}
  input:focus,textarea:focus{outline:none;border-color:var(--blue)}
  textarea{resize:vertical;min-height:64px}
  label.fld{display:block;font-size:12px;color:var(--muted);margin:0 0 5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:760px){.grid3{grid-template-columns:1fr}}

  /* language switch */
  .langsw{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .langsw button{cursor:pointer;border:none;background:transparent;color:var(--muted);padding:7px 13px;font-size:13px;font-weight:700}
  .langsw button.on{background:var(--blue);color:#fff}

  /* progress / phases */
  .phases{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 18px}
  .ph{font-size:12px;color:var(--muted);background:var(--panel);border:1px solid var(--line);padding:6px 11px;border-radius:999px}
  .ph.active{background:var(--blue);border-color:var(--blue);color:#fff}
  .ph.done{border-color:var(--good);color:var(--good)}

  /* timer */
  .timer{font-variant-numeric:tabular-nums;font-weight:700}
  .timer.warn{color:var(--yellow)} .timer.over{color:var(--bad)}

  /* die */
  .die{width:78px;height:78px;border-radius:16px;background:#fff;color:#111;display:grid;place-items:center;font-size:40px;box-shadow:var(--shadow);transition:transform .1s}
  .die.rolling{animation:shake .4s linear infinite}
  @keyframes shake{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}

  /* wedge color chips */
  .chip{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:13px}
  .dotc{width:14px;height:14px;border-radius:50%}

  /* sticky wall */
  .wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
  .sticky{border-radius:12px;padding:12px 12px 10px;color:#16202b;font-size:14px;line-height:1.35;box-shadow:0 6px 14px rgba(0,0,0,.3);position:relative;min-height:84px;display:flex;flex-direction:column;word-break:break-word}
  .sticky .meta{margin-top:auto;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:700;opacity:.8;padding-top:8px}
  .sticky .x{position:absolute;top:6px;right:8px;cursor:pointer;opacity:.5;font-weight:700}
  .sticky .x:hover{opacity:1}
  .votes{display:flex;gap:3px;flex-wrap:wrap}
  .vdot{width:13px;height:13px;border-radius:50%;background:rgba(0,0,0,.55);cursor:pointer}
  .sticky.cand{outline:3px solid #fff;outline-offset:2px}

  /* prompt card */
  .prompt{background:linear-gradient(180deg,#fdfdfd,#eef1f5);color:#1a2330;border-radius:14px;padding:18px 20px;font-size:18px;line-height:1.4;font-weight:600;min-height:90px;display:flex;align-items:center;box-shadow:var(--shadow)}

  /* PIE */
  .pieWrap{display:flex;gap:30px;align-items:center;flex-wrap:wrap;justify-content:center}
  .legend{display:flex;flex-direction:column;gap:8px;min-width:230px}
  .legrow{display:flex;align-items:center;gap:10px;font-size:13px}
  .legrow .nm{font-weight:700}
  .legrow.earned .nm{color:#fff}
  .legrow .st{margin-left:auto;font-size:11px;color:var(--muted)}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#0f141b;border:1px solid var(--line);padding:12px 18px;border-radius:12px;box-shadow:var(--shadow);font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

  .tag{font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:var(--muted)}
  .divider{height:1px;background:var(--line);margin:18px 0}
  .qmbadge{background:#2a2030;border:1px solid #4a3a52;color:#e9b3ff;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
  .crit{font-size:13px;color:var(--muted);line-height:1.5}
  .crit b{color:var(--ink)}
  .failbox{background:#2a1b1b;border:1px solid #5a2b2b;border-radius:10px;padding:12px;font-size:12.5px;color:#ffc4c4;line-height:1.5}
  .helpbox{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--muted);line-height:1.55}
  .candlist{display:flex;flex-direction:column;gap:10px}
  .candcard{display:flex;gap:12px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .candcard .mini{display:flex;gap:4px}
  .candcard .mini i{width:10px;height:10px;border-radius:50%;display:block}
  .statement{font-size:20px;line-height:1.7;background:linear-gradient(180deg,#fdfdfd,#eef1f5);color:#1a2330;border-radius:14px;padding:26px 30px}
  .statement .b{font-weight:800;padding:1px 4px;border-radius:5px}
  .hidden{display:none !important}
  .winnerbanner{background:linear-gradient(90deg,rgba(47,171,99,.18),rgba(47,171,99,0));border:1px solid var(--good);border-radius:12px;padding:14px 18px;font-weight:700;color:#bff0d2}
  /* per-round rules reveal */
  details.rules{margin:0 0 16px;border:1px solid #34507a;border-radius:12px;background:linear-gradient(180deg,#172234,#141a22);overflow:hidden}
  details.rules>summary{cursor:pointer;list-style:none;padding:13px 16px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:9px;color:#cfe0f2}
  details.rules>summary::-webkit-details-marker{display:none}
  details.rules>summary:hover{background:#1b2940}
  details.rules>summary::after{content:"▾";margin-left:auto;color:var(--muted);font-size:13px;font-weight:600}
  details.rules[open]>summary::after{content:"▴"}
  details.rules .rbody{padding:6px 18px 16px;font-size:13.5px;line-height:1.65;color:#aeb9c6;border-top:1px solid #2b3a52}
  details.rules .rbody b{color:var(--ink)}
  details.rules .rbody i{color:#cfe0f2}
  details.rules .rbody ul{margin:8px 0;padding-left:20px}
  details.rules .rbody li{margin:5px 0}
  details.rules .rbody .warn{color:#ffd28a;font-weight:700}
  @media print{
    .noprint{display:none !important}
    html,body{background:#fff;color:#000}
    .card{box-shadow:none;border:1px solid #ccc}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 100 100" id="logoPie"></svg>
      <div>
        <h1 id="appTitle">The Trivial Pursuit of a Startup Idea</h1>
        <p id="appSub">A 90-minute hunt for an AI-first idea · 3 co-founders</p>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="langsw noprint" id="langsw">
      <button data-lang="en">EN</button><button data-lang="nl">NL</button>
    </div>
    <div class="pill noprint" id="roundTimerPill" style="display:none">
      <span>⏱</span><span class="timer" id="phaseTimer">--:--</span>
      <button class="btn sm ghost" id="timerToggle">Start</button>
      <button class="btn sm ghost" id="timerReset">↺</button>
    </div>
    <button class="btn ghost sm noprint" id="resetAll">Reset session</button>
  </header>

  <div class="phases noprint" id="phaseBar"></div>

  <main id="app"></main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   WEDGE BASE (language-independent) + I18N CONTENT
============================================================ */
const WEDGE_BASE = [
  {key:"market",  color:"blue",   colorNl:"blauwe", hex:"#1f7ae0", emoji:"🔵"},
  {key:"pain",    color:"pink",   colorNl:"roze",   hex:"#e85aa0", emoji:"🩷"},
  {key:"ai",      color:"green",  colorNl:"groene", hex:"#2fab63", emoji:"🟢"},
  {key:"why",     color:"yellow", colorNl:"gele",   hex:"#f2b705", emoji:"🟡"},
  {key:"insight", color:"brown",  colorNl:"bruine", hex:"#8a5a3c", emoji:"🟤"},
  {key:"win",     color:"orange", colorNl:"oranje", hex:"#f2792b", emoji:"🟠"}
];

const I18N = {
  en:{
    chrome:{title:"The Trivial Pursuit of a Startup Idea", sub:"A 90-minute hunt for an AI-first idea · 3 co-founders"},
    phases:[ {label:"Setup"}, {label:"Warm-up",min:5}, {label:"Lap 1 · Diverge",min:40},
             {label:"Pick contenders",min:10}, {label:"Lap 2 · The pie",min:30}, {label:"Synthesis",min:10} ],
    wedges:{
      market:{ original:"Geography", lens:"Market",
        earn:"A specific, reachable group with money to spend.",
        example:'Not "SMBs" — "12-person dental practices in the Benelux."',
        crit:"Name a real, reachable beachhead with a budget. Not “everyone,” not “businesses.”",
        fail:"The market is “everyone,” or so broad you can’t name 100 reachable customers.",
        cards:[ "Who has this problem so badly they've built a spreadsheet / duct-tape fix for it?",
          "Whose budget is already being spent here, just inefficiently?",
          "Which group do WE have unusual access to — through past jobs, networks, or relationships?",
          "Name the smallest viable beachhead: the 100 customers you could actually reach." ]},
      pain:{ original:"Entertainment", lens:"Pain",
        earn:"A real, frequent, painful problem they endure today.",
        example:"Something they already hack around or pay to avoid.",
        crit:"A frequent, painful, hair-on-fire problem they live with today — measurable in hours or money.",
        fail:"It’s a vitamin, not a painkiller — nice-to-have, not hair-on-fire.",
        cards:[ "What task in this world is tedious, repetitive, and universally hated?",
          'What do people apologize for being slow at? ("Sorry, still pulling that report…")',
          "Where does money or time leak today without anyone owning the problem?",
          'What would make someone say "finally, someone built this"?' ]},
      ai:{ original:"Science & Nature", lens:"AI capability",
        earn:"Something AI can NOW do here that was impossible/too expensive ~2 years ago.",
        example:"This is the AI-first test — the Green wedge is the gate.",
        crit:"Without the AI, the business breaks. AI does something newly reliable, cheap, or instant here.",
        fail:"The AI is decoration. The idea is ~as good without it → it’s a feature, not the business.",
        cards:[ "What can a model do NOW that it couldn't do reliably 2 years ago — and is that the crux here?",
          "If this idea works just as well WITHOUT AI, it's not AI-first. What breaks without the AI?",
          "What was previously gated by needing an expert human, that AI now makes cheap and instant?",
          "What volume / scale of judgment was impossible to do by hand?" ]},
      why:{ original:"History", lens:"Why now",
        earn:"What changed to open the window.",
        example:"Model capability, cost curve, regulation, behavior shift, a new API.",
        crit:"A real change in the last ~18 months — a price, model, law, or habit — that opened the window.",
        fail:"“Why now” is really “why not earlier” with no actual change.",
        cards:[ "What changed in the last 18 months — a price, a model, a law, a habit?",
          "Why did this fail before, and what's different today?",
          "What are people only NOW willing to trust software to do?",
          "Is there a deadline the world is walking into (regulation, cost pressure)?" ]},
      insight:{ original:"Arts & Literature", lens:"Unfair insight",
        earn:"What the three of you know or believe that most people don't.",
        example:'Your "secret." Often born of lived experience.',
        crit:"A non-obvious belief experts would argue with — and why YOU three specifically can see it.",
        fail:"The insight is something any consultant would also say.",
        cards:[ "What do the three of us believe about this space that experts would argue with?",
          "What painful truth did one of us learn the hard way in a past job?",
          "What does the data / our experience say that the conventional wisdom misses?",
          "Why are WE, specifically, the right people to see this?" ]},
      win:{ original:"Sports & Leisure", lens:"The win",
        earn:"How you get distribution AND stay ahead — the moat.",
        example:"Why you won't just get copied in a weekend.",
        crit:"A repeatable distribution channel + a structural advantage that compounds over time.",
        fail:"“We’ll out-execute them” with no structural advantage.",
        cards:[ "How does the 1,001st customer find us — what's the repeatable distribution channel?",
          "What gets BETTER as we get bigger (data, network, integrations, workflow lock-in)?",
          "Why can't a competitor copy this in a weekend?",
          "What do we own in a year that a newcomer would need years to rebuild?" ]}
    },
    trivia:[
      ["Amazon River","What's the longest, most meandering workflow in our market that nobody has straightened out?"],
      ["Marie Curie","Where is one expert doing something no one else can — and could AI democratize it?"],
      ["The Great Wall of China","What barrier in this industry is huge, ancient, and mostly there out of habit?"],
      ["Photosynthesis","Where could something turn a free, abundant input into value almost automatically?"],
      ["Mount Everest","What's the single hardest, most prestige-laden task in this field — and who's stuck at base camp?"],
      ["The printing press","What's still being hand-copied here that could be mass-produced?"],
      ["Houdini","What do people in this market desperately want to escape from every week?"],
      ["The Rosetta Stone","Where are two groups unable to understand each other for lack of translation?"],
      ["Penicillin","What accidental, overlooked thing in this space could quietly cure a big pain?"],
      ["The stock exchange","Where is there a messy, opaque market that's screaming for a clearinghouse?"],
      ["Beethoven","Who's producing brilliant work while going 'deaf' to a problem right in front of them?"],
      ["The assembly line","What artisanal, one-off process here could be standardized into a line?"],
      ["Pompeii","What in this industry is frozen in time, buried under old assumptions?"],
      ["The compass","Who is navigating this space blind, with no reliable sense of direction?"],
      ["Spreadsheets","What critical workflow still lives in a fragile spreadsheet someone's terrified to break?"],
      ["The lighthouse","Where do customers keep crashing on the same rocks for lack of a warning signal?"]
    ],
    rules:{
      start:`<b>Goal — set the table.</b> Name all three founders and confirm their seats (CEO / CTO / CCO).
        <br><br><b>The Question Master (QM).</b> One person runs each category. The QM reads the prompt card aloud,
        <b>refuses vague answers</b>, and calls the vote on whether a wedge is earned. The role <b>rotates every category</b> —
        the app tracks whose turn it is, so all three of you run it roughly twice across the two laps.
        <br><br><b>The whole arc.</b> Lap 1 you scatter problems across all six wedges (diverge). You dot-vote and pick 2–3 candidate
        ideas. Lap 2 you take ONE idea and try to earn all six wedges for it (converge). The first idea to complete the pie is your lead candidate.`,
      warmup:`<b>Time:</b> 5 minutes.<br><b>Do this:</b> each founder names <b>one industry</b> they've worked in, lived near, or are
        quietly obsessed with. <b>No filtering, no judging.</b> These seed the wall — they become your first Market stickies.`,
      lap1:`<b>Time:</b> ~40 minutes — roughly 6–7 minutes per category.<br><b>Do this:</b> go category by category, or <b>roll the die</b>
        to pick the next color (randomness stops you camping in your comfort zone). For each category, draw a prompt card and
        <b>generate as many candidate answers as you can</b> on that color's stickies.
        <ul><li><b>Lap 1 goal is breadth, not a single idea</b> — do NOT try to connect things yet.</li>
        <li>You want a messy wall: many markets, many pains, many capabilities.</li>
        <li class="warn">Resist convergence — it kills options early.</li></ul>
        <b>Stuck?</b> Hit the Trivia jolt: read a random card answer and force a connection. Use it as a jolt, not the main engine.`,
      contenders:`<b>Time:</b> 10 minutes.<br><b>Do this:</b> cluster the wall, then each founder <b>silently</b> places dots on the 2–3
        stickies that genuinely excite them (click a sticky to add a dot, shift-click to remove). Look for natural pairings — usually a
        <b>Pain + Market</b> that fit together. Then name your top <b>2–3 candidate ideas</b> and attach the relevant stickies to each.`,
      lap2:`<b>Time:</b> ~30 minutes.<br><b>Do this:</b> take <b>ONE</b> candidate idea. Go wedge by wedge and try to earn all six wedges
        <i>for that specific idea</i>.
        <ul><li>The QM awards a wedge only when <b>all three of you agree</b> the answer is specific and true.</li>
        <li>Can't fill a wedge (no real moat, or AI doesn't actually change the game)? It's incomplete — <b>record the gap, set it aside, start the next candidate.</b></li>
        <li>The first idea to complete the pie is your lead candidate.</li></ul>
        <b>Two rules that make or break it.</b> (1) <b>Specificity over cleverness</b> — reject “businesses need better data”; demand
        “a 12-person dental practice loses ~3 hrs/week reconciling claims by hand.” (2) <b>The Green wedge is the gate</b> — if the idea
        is roughly as good without the AI, the AI is a feature, not the business.
        <br><br><span class="warn">Don't award a wedge if:</span> the market is “everyone” (🔵) · the pain is a vitamin (🩷) ·
        the AI is decoration (🟢) · “why now” is really “why not earlier” (🟡) · the insight is something any consultant would say (🟤) ·
        or the moat is just “we'll out-execute them” (🟠).
        <br><br>You'll often learn more from <i>why</i> an exciting idea couldn't earn its Green or Orange wedge than from the winner.`,
      synthesis:`<b>Time:</b> 10 minutes.<br><b>Do this:</b> for the idea that completed the pie, read the winner statement out loud,
        filled in from your six earned wedges:
        <br><br><i>“For [market], who struggle with [pain], we use [AI capability] — newly viable because [why now]. Unlike others,
        we see that [insight], and we'll win by [distribution + moat].”</i>
        <br><br>If you can say that paragraph out loud and <b>all three nod</b>, you have something worth a week of customer conversations.
        Save/print it — and review what the candidates that <i>didn't</i> complete taught you. Those gaps are often the most useful output.`
    },
    statement:["For ", ", who struggle with ", ", we use ", " — newly viable because ", ". Unlike others, we see that ", ", and we'll win by ", "."],
    ui:{
      resetSession:"Reset session", start:"Start", pause:"Pause", qm:"QM:",
      founder:"Founder", namePlaceholder:"Name", add:"Add", remove:"remove", cancel:"cancel", undo:"undo",
      // start
      setupTitle:"Set up your table",
      setupP:"Three complementary minds. Name each founder and confirm their seat. The Question Master rotates every category — the app tracks it for you.",
      howItPlays:"<b>How it plays.</b> Lap 1 you scatter problems across all six wedges (diverge). You then dot-vote and pick 2–3 candidate ideas. Lap 2 you take ONE idea and try to earn all six wedges for it. The first idea to <b>complete the pie</b> is your lead candidate. An incomplete pie isn't failure — it's the session working.",
      beginWarmup:"Begin warm-up →",
      // warmup
      warmupTitle:"Warm-up · 5 min",
      warmupP:"Each founder names one industry they've worked in, lived near, or are quietly obsessed with. No filtering, no judging. This seeds the wall.",
      industryPlaceholder:"An industry I'm obsessed with…",
      industryPrefix:"Industry: ",
      backSetup:"← Setup", startLap1:"Start Lap 1 — Diverge →",
      // lap1
      lap1Tag:"Lap 1 · breadth, not a single idea — resist convergence",
      earnLater:"Earn it later by:",
      rollColor:"🎲 Roll for next color", drawPrompt:"↻ Draw another prompt",
      triviaJoltLong:"🃏 Trivia jolt (stuck?)", triviaJolt:"🃏 Trivia jolt",
      cardAnswer:"Card answer:", forceConnection:"Force a connection:",
      addIdea:(lens,color)=>`Add a ${lens.toLowerCase()} idea on a ${color} sticky… (Enter)`,
      wall:"wall", ideas:"ideas",
      noIdeas:(lens)=>`No ${lens.toLowerCase()} ideas yet.`,
      backWarmup:"← Warm-up", nextCategory:"Next category →", doneDiverging:"Done diverging — pick contenders →",
      toastScatter:"Scatter a few more ideas across the wall first.",
      toastRolled:(n,lens)=>`Rolled ${n} → ${lens}`,
      // contenders
      contendersTitle:"Pick contenders · 10 min",
      contendersP:"Cluster the wall. Each founder silently places dots on the 2–3 stickies that genuinely excite them. Look for natural pairings — usually a <b>Pain + Market</b> that fit. Then name your top 2–3 candidate ideas to take into Lap 2.",
      voteHelp:"👉 <b>Vote:</b> click any sticky to add a dot, shift-click to remove. Dots are anonymous and just help you see what's hot.",
      candidateIdeas:"Candidate ideas",
      candidateP:"Name an idea, then tap the stickies that belong to it (usually one Pain + one Market). Aim for 2–3.",
      candNamePlaceholder:"Candidate idea name, e.g. 'Auto insurance-claim reconciler for dental practices'",
      addCandidate:"+ Add candidate",
      pieComplete:"PIE COMPLETE 🥧",
      stickiesWedges:(n,e)=>`${n} stickies · ${e}/6 wedges`,
      attachStickies:"attach stickies ▾",
      noCandidates:"No candidates yet.",
      backLap1:"← Back to Lap 1", playForPie:"Play for the pie — Lap 2 →",
      toastAddCandidate:"Add at least one candidate idea.",
      // lap2
      lap2Title:"Lap 2 · Play for the pie",
      lap2P:(qm)=>`Take <b>ONE</b> candidate. Go wedge by wedge and try to earn all six. The QM (<span class="qmbadge">${qm}</span>) only awards a wedge when <b>all three of you agree</b> the answer is specific and true. Can't fill one? Record the gap, set it aside, start the next candidate.`,

let S = load() || blankState();

const uid = () => Math.random().toString(36).slice(2,9);

// build language-dependent wedge list
let WEDGES=[], WK={};
function rebuildWedges(){
  WEDGES = WEDGE_BASE.map(b=>Object.assign({}, b, L().wedges[b.key]));
  WK = WEDGES.reduce((m,w)=>(m[w.key]=w,m),{});
}
rebuildWedges();

const PHASES_BASE=[ {id:"start"},{id:"warmup",min:5},{id:"lap1",min:40},{id:"contenders",min:10},{id:"lap2",min:30},{id:"synthesis",min:10} ];
function phaseLabel(i){ const l=L().phases[i]; return l.label + (l.min?` · ${l.min}m`:""); }

/* ============================================================
   PIE RENDERING
============================================================ */
function piePath(cx,cy,r,startDeg,endDeg){
  const a0=(startDeg-90)*Math.PI/180, a1=(endDeg-90)*Math.PI/180;
  const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
  const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
  const large = (endDeg-startDeg)>180?1:0;
  return `M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1} Z`;
}
function renderPie(svg, earnedKeys, size=240, interactive=false, onClick=null){
  const cx=size/2, cy=size/2, r=size/2-4;
  svg.setAttribute("viewBox",`0 0 ${size} ${size}`);
  let html="";
  WEDGES.forEach((w,i)=>{
    const earned = earnedKeys.includes(w.key);
    const p = piePath(cx,cy,r,i*60,(i+1)*60);
    html += `<path d="${p}" fill="${earned?w.hex:'#222b36'}" stroke="#0e1116" stroke-width="2"
              style="cursor:${interactive?'pointer':'default'};${earned?'':'opacity:.55'}" data-wk="${w.key}"></path>`;
    const mid=(i*60+30-90)*Math.PI/180, lr=r*0.62;
    const lx=cx+lr*Math.cos(mid), ly=cy+lr*Math.sin(mid);
    html += `<circle cx="${lx}" cy="${ly}" r="${size*0.07}" fill="${earned?'rgba(255,255,255,.9)':'rgba(255,255,255,.12)'}"></circle>`;
    if(earned) html += `<text x="${lx}" y="${ly+ size*0.025}" text-anchor="middle" font-size="${size*0.07}" font-weight="800" fill="${w.hex}">✓</text>`;
  });
  html += `<circle cx="${cx}" cy="${cy}" r="${size*0.10}" fill="#0e1116" stroke="#2b3440" stroke-width="2"></circle>`;
  svg.innerHTML=html;
  if(interactive){

/* ============================================================
   TIMER
============================================================ */
let timer={running:false, remaining:0, int:null};
function setupTimer(minutes){
  clearInterval(timer.int); timer.running=false; timer.remaining=minutes*60;
  paintTimer();
  document.getElementById("roundTimerPill").style.display = minutes? "flex":"none";
}
function paintTimer(){
  const el=document.getElementById("phaseTimer");
  if(!el) return;
  const neg = timer.remaining<0;
  const t=Math.abs(timer.remaining);
  const m=String(Math.floor(t/60)).padStart(2,"0"), s=String(t%60).padStart(2,"0");
  el.textContent=(neg?"+":"")+m+":"+s;
  el.className="timer"+(neg?" over":(timer.remaining<60?" warn":""));
  const tog=document.getElementById("timerToggle"); if(tog) tog.textContent=timer.running?U().pause:U().start;
}
document.getElementById("timerToggle").onclick=()=>{
  timer.running=!timer.running;
  if(timer.running){ timer.int=setInterval(()=>{timer.remaining--;paintTimer();if(timer.remaining===0)ding();},1000); }
  else clearInterval(timer.int);
  paintTimer();
};
document.getElementById("timerReset").onclick=()=>{ const ph=PHASES_BASE.find(p=>p.id===S.phase); setupTimer(ph&&ph.min||0); };
function ding(){ try{ const a=new (window.AudioContext||window.webkitAudioContext)(); const o=a.createOscillator(),g=a.createGain(); o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.value=.12;o.start();setTimeout(()=>{o.frequency.value=660},150);setTimeout(()=>{o.stop();a.close()},420);}catch(e){} }

   TOAST
============================================================ */
let toastT;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }

function rollDie(dieEl){
  if(dieRolling) return; dieRolling=true; dieEl.classList.add("rolling");
  let ticks=0; const iv=setInterval(()=>{ dieEl.textContent=dieFace(1+Math.floor(Math.random()*6)); if(++ticks>10){clearInterval(iv);
    const n=1+Math.floor(Math.random()*6); dieEl.textContent=dieFace(n); dieEl.classList.remove("rolling"); dieRolling=false;
    S.lap1Cat=n-1; save(); rotateQM(); setTimeout(()=>{render();toast(U().toastRolled(n,WEDGES[n-1].lens));},250); } },70);
}
function paintWall(wallEl, wkey, votingMode){
  const w=WK[wkey];
  const list=S.stickies.filter(s=>s.wedge===wkey);
  wallEl.innerHTML = list.length? "" : `<p class="muted">${U().noIdeas(w.lens)}</p>`;
  list.forEach(s=>{
    const card=el(`<div class="sticky ${isCandSticky(s.id)?'cand':''}" style="background:${tint(w.hex)}"></div>`);
    card.innerHTML=`
      <span class="x" title="${U().remove}">✕</span>
      <div>${escapeHtml(s.text)}</div>
      <div class="meta">
        <span>${escapeHtml(founderName(s.author))}</span>
        <span class="votes">${s.votes.map(()=>`<span class="vdot"></span>`).join("")}</span>
      </div>`;
    card.querySelector(".x").onclick=()=>{S.stickies=S.stickies.filter(x=>x.id!==s.id);save();render();};
    if(votingMode){
      card.style.cursor="pointer";
      card.onclick=(e)=>{ if(e.target.classList.contains("x"))return;
        if(e.shiftKey){ s.votes.pop(); } else { s.votes.push(1); }
        save(); render(); };
    }
    wallEl.appendChild(card);
  });
}
function isCandSticky(id){ return S.candidates.some(c=>c.stickyIds.includes(id)); }
function tint(hex){
  const m={ "#1f7ae0":"#cfe4ff","#e85aa0":"#ffd4ea","#2fab63":"#cdf0d9","#f2b705":"#ffeeb0","#8a5a3c":"#e8d2c2","#f2792b":"#ffd9bf"};
  return m[hex]||"#eee";
}

  const earned=cd.wedges[w.key].earned;
  work.innerHTML=`
    <div class="row" style="justify-content:space-between;align-items:flex-start">
      <div>
        <h3 style="font-size:20px">${w.emoji} ${w.lens} <span class="muted" style="font-weight:400">— ${escapeHtml(w.earn)}</span></h3>
        <p class="crit"><b>${U().awardOnlyIf}</b> ${escapeHtml(w.crit)}</p>
      </div>
      <span class="qmbadge">${U().qm} ${escapeHtml(qmName())}</span>
    </div>
    <div class="prompt" id="p2" style="font-size:16px;min-height:64px">${escapeHtml(S.lap2Prompt[w.key])}</div>
    <div class="row noprint" style="margin:10px 0">
      <button class="btn sm ghost" id="draw2">${U().drawPrompt}</button>
      <button class="btn sm ghost" id="jolt2">${U().triviaJolt}</button>
    </div>
    <div id="joltBox2"></div>
    <label class="fld" style="margin-top:6px">${U().answerLabel}</label>
    <textarea id="ans" placeholder="${escapeHtml(w.example)}">${escapeHtml(cd.wedges[w.key].answer)}</textarea>
    <div class="failbox" style="margin-top:10px">${U().dontAward} ${escapeHtml(w.fail)}</div>
    <div class="row" style="margin-top:14px;align-items:center">
      ${earned
        ? `<span class="winnerbanner" style="flex:1">${U().wedgeBanner}</span>
           <button class="btn ghost sm" id="unaward">${U().undo}</button>`
        : `<button class="btn good" id="award">${U().awardWedge}</button>
           <button class="btn bad" id="gap">${U().cantFill}</button>`}
    </div>
    <div id="gapBox"></div>`;
  c.appendChild(work);

  work.querySelector("#ans").oninput=e=>{cd.wedges[w.key].answer=e.target.value;save();};
  work.querySelector("#draw2").onclick=()=>{S.lap2Prompt[w.key]=randCard(w);save();work.querySelector("#p2").textContent=S.lap2Prompt[w.key];};
  work.querySelector("#jolt2").onclick=()=>{const [a,q]=trivia();
    work.querySelector("#joltBox2").innerHTML=`<div class="helpbox" style="margin-top:10px">🃏 <b>${a}</b> ↳ <i>${escapeHtml(q)}</i></div>`;};
  if(work.querySelector("#award")) work.querySelector("#award").onclick=()=>{
    if(!cd.wedges[w.key].answer.trim()){toast(U().toastWriteAnswer);return;}
    cd.wedges[w.key].earned=true; delete cd.gaps[w.key]; checkComplete(cd); save();
    if(cd.complete){ toast(U().toastPieComplete(cd.name)); } else { toast(U().toastWedgeEarned(w.lens)); }
    advanceLap2(cd);
  };
  if(work.querySelector("#unaward")) work.querySelector("#unaward").onclick=()=>{cd.wedges[w.key].earned=false;cd.complete=false;save();render();};
  if(work.querySelector("#gap")) work.querySelector("#gap").onclick=()=>{
    work.querySelector("#gapBox").innerHTML=`
      <div class="helpbox" style="margin-top:12px">
        <label class="fld">${U().gapQuestion(w.lens)}</label>
        <textarea id="gapWhy" placeholder="${U().gapPlaceholder}">${escapeHtml(cd.gaps[w.key]||"")}</textarea>
        <div class="row" style="margin-top:10px">
          <button class="btn" id="saveGap">${U().saveGap}</button>
          <button class="btn ghost" id="cancelGap">${U().cancel}</button>
        </div>
      </div>`;
    work.querySelector("#saveGap").onclick=()=>{ cd.gaps[w.key]=work.querySelector("#gapWhy").value.trim()||"(gap)"; cd.wedges[w.key].earned=false; cd.complete=false; save();
      toast(U().toastGapRecorded); S.activeCand=null; save(); render(); };
    work.querySelector("#cancelGap").onclick=()=>{work.querySelector("#gapBox").innerHTML="";};
  };

  const nav=el(`<div class="row noprint" style="margin-top:16px;gap:8px;flex-wrap:wrap"></div>`);
  WEDGES.forEach((ww,i)=>{
    const e=cd.wedges[ww.key]&&cd.wedges[ww.key].earned;
    const b=el(`<button class="btn sm ${i===S.lap2Cat?'primary':(e?'good':'ghost')}">${ww.emoji} ${ww.lens}${e?' ✓':''}</button>`);
    b.onclick=()=>{S.lap2Cat=i;save();render();};
    nav.appendChild(b);
  });
  c.appendChild(nav);

  const foot=el(`<div class="row" style="margin-top:14px;justify-content:space-between"></div>`);
  foot.innerHTML=`<button class="btn ghost" id="back">${U().backContenders}</button>
    <div class="row">
      ${S.lap2Cat<5?`<button class="btn" id="next">${U().nextWedge}</button>`:''}
      <button class="btn primary" id="toSyn" ${cd.complete?'':'disabled'} title="${cd.complete?'':U().completePieFirst}">${U().synthesisArrow}</button>
    </div>`;
  c.appendChild(foot);
  head.querySelector("#switch").onclick=()=>{S.activeCand=null;save();render();};
  foot.querySelector("#back").onclick=()=>go("contenders");
  if(foot.querySelector("#next")) foot.querySelector("#next").onclick=()=>{S.lap2Cat++;save();rotateQM();render();window.scrollTo({top:0,behavior:'smooth'});};
  foot.querySelector("#toSyn").onclick=()=>{ if(cd.complete) go("synthesis"); };
  app.appendChild(c);
}
function checkComplete(cd){ cd.complete=WEDGES.every(w=>cd.wedges[w.key]&&cd.wedges[w.key].earned); }
function advanceLap2(cd){
  if(cd.complete){ render(); return; }
  let i=S.lap2Cat;
  for(let k=1;k<=6;k++){ const ni=(i+k)%6; if(!(cd.wedges[WEDGES[ni].key]&&cd.wedges[WEDGES[ni].key].earned)){ S.lap2Cat=ni; break; } }
  rotateQM(); save(); render(); window.scrollTo({top:0,behavior:'smooth'});
}

/* ============================================================
   6. SYNTHESIS
============================================================ */
function renderSynthesis(app){
  app.appendChild(el(rulesBlock("synthesis")));
  const winners=S.candidates.filter(c=>c.complete);
  const c=el(`<section></section>`);
  const top=el(`<div class="card pad" style="margin-bottom:16px"></div>`);
  top.innerHTML=`<h2>${U().synthesisTitle}</h2><p class="muted">${U().synthesisP}</p>`;
  c.appendChild(top);

  if(!winners.length){
    const none=el(`<div class="card pad"></div>`);
    none.innerHTML=`<div class="winnerbanner" style="border-color:#5a4a2b;background:rgba(242,183,5,.12);color:#ffe8a8">${U().noPie}</div>
      <div style="margin-top:14px" id="gaps"></div>
      <div class="row" style="margin-top:14px"><button class="btn primary" id="back">${U().backLap2}</button></div>`;
    c.appendChild(none);
    none.querySelector("#gaps").innerHTML=renderGaps();
    none.querySelector("#back").onclick=()=>go("lap2");
    app.appendChild(c); return;
  }

  const P=L().statement;
  winners.forEach(cd=>{
    const card=el(`<div class="card pad" style="margin-bottom:16px"></div>`);
    const g=k=>escapeHtml((cd.wedges[k].answer||"…").trim());
    card.innerHTML=`
      <div class="row" style="justify-content:space-between;align-items:center">
        <h3 style="font-size:20px">🥧 ${escapeHtml(cd.name)}</h3>
        <svg width="64" height="64" id="pie_${cd.id}"></svg>
      </div>
      <div class="statement" style="margin-top:10px">
        ${P[0]}<span class="b" style="background:#cfe4ff">${g("market")}</span>${P[1]}<span class="b" style="background:#ffd4ea">${g("pain")}</span>${P[2]}<span class="b" style="background:#cdf0d9">${g("ai")}</span>${P[3]}<span class="b" style="background:#ffeeb0">${g("why")}</span>${P[4]}<span class="b" style="background:#e8d2c2">${g("insight")}</span>${P[5]}<span class="b" style="background:#ffd9bf">${g("win")}</span>${P[6]}
      </div>`;
    c.appendChild(card);
    renderPie(card.querySelector("#pie_"+cd.id), WEDGES.map(w=>w.key), 64);
  });

  const gapsCard=el(`<div class="card pad" style="margin-bottom:16px"></div>`);
  gapsCard.innerHTML=`<h3>${U().taughtTitle}</h3>${renderGaps()}`;
  c.appendChild(gapsCard);

  const foot=el(`<div class="row noprint" style="justify-content:space-between"></div>`);
  foot.innerHTML=`<button class="btn ghost" id="back">${U().backLap2Short}</button>
    <div class="row">
      <button class="btn" id="print">${U().printPdf}</button>
      <button class="btn good" id="restart">${U().playAgain}</button>
    </div>`;
  c.appendChild(foot);
  foot.querySelector("#back").onclick=()=>go("lap2");
  foot.querySelector("#print").onclick=()=>window.print();
  foot.querySelector("#restart").onclick=()=>{ if(confirm(U().confirmRestart)){ S=blankState(); S.lang=LANG; save(); go("start"); } };
  app.appendChild(c);
}
function renderGaps(){
  const items=[];
  S.candidates.forEach(cd=>{
    Object.keys(cd.gaps||{}).forEach(k=>{ items.push(`<li>${U().gapLine(escapeHtml(cd.name), WK[k].emoji, WK[k].lens, escapeHtml(cd.gaps[k]))}</li>`); });
  });
  return items.length? `<ul style="line-height:1.7">${items.join("")}</ul>` : `<p class="muted">${U().noGaps}</p>`;
}

/* ============================================================
   UTIL + BOOT
============================================================ */
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
document.getElementById("resetAll").onclick=()=>{ if(confirm(U().confirmReset)){ const lang=LANG; S=blankState(); S.lang=lang; save(); go("start"); } };
document.querySelectorAll("#langsw button").forEach(b=>b.onclick=()=>setLang(b.dataset.lang));

applyChrome();
render();
</script>
</body>
</html>
