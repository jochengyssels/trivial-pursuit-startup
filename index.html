<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The TriAmigos · The Trivial Pursuit of a Startup Idea</title>
<style>
  :root{
    --amber:#ffb24d; --amber2:#ff8a1f; --warm:#ffd9a0; --ink:#f6ead6;
    --blue:#1f7ae0; --pink:#e85aa0; --green:#2fab63; --yellow:#f2b705; --brown:#8a5a3c; --orange:#f2792b;
    --font:"Segoe UI",Roboto,-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);background:#07060a;color:var(--ink);overflow:hidden}
  .stage{position:fixed;inset:0;display:grid;place-items:center;overflow:hidden}

  /* ---- optional real photo (auto-used if triamigos.jpg exists) ---- */
  #hero{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;
    transition:opacity 1.4s ease;animation:kenburns 28s ease-in-out infinite alternate;z-index:1}
  body.has-photo #hero{opacity:1}
  body.has-photo .scene{opacity:0}
  @keyframes kenburns{0%{transform:scale(1.06) translate(0,0)}100%{transform:scale(1.16) translate(-2%,-2%)}}

  /* ---- CSS art scene (mood of the photo) ---- */
  .scene{position:absolute;inset:0;z-index:1;transition:opacity 1s ease;
    background:
      radial-gradient(120% 80% at 50% -8%, rgba(255,210,140,.18), rgba(255,170,70,.05) 24%, transparent 46%),
      radial-gradient(70% 55% at 50% 64%, rgba(255,150,40,.10), transparent 60%),
      linear-gradient(180deg,#120d0a 0%, #0c0908 42%, #070506 100%);}
  /* warm wall + cabinetry hint */
  .scene::before{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(60,44,30,.5) 0%, rgba(20,14,10,.0) 38%);}
  /* table edge in foreground */
  .table{position:absolute;left:-5%;right:-5%;bottom:-2%;height:34%;
    background:linear-gradient(180deg,#5b3c22 0%, #3c2716 45%, #25160c 100%);
    transform:perspective(700px) rotateX(34deg);transform-origin:bottom;
    box-shadow:0 -22px 60px rgba(0,0,0,.55), inset 0 12px 40px rgba(255,170,90,.10);z-index:3}
  .table::after{content:"";position:absolute;inset:0;background:
    repeating-linear-gradient(92deg, rgba(0,0,0,.06) 0 38px, rgba(255,200,140,.04) 38px 80px);opacity:.5}

  /* lamp flare top-center */
  .lamp{position:absolute;top:-14%;left:50%;width:60vmax;height:60vmax;transform:translateX(-50%);
    background:radial-gradient(circle, rgba(255,236,200,.85) 0%, rgba(255,196,120,.35) 9%, rgba(255,170,80,.12) 20%, transparent 46%);
    z-index:2;animation:lampPulse 6s ease-in-out infinite;filter:blur(2px)}
  .rays{position:absolute;top:-26%;left:50%;width:90vmax;height:90vmax;transform:translateX(-50%);z-index:2;
    background:conic-gradient(from 0deg, transparent 0 6deg, rgba(255,225,180,.06) 7deg 8deg, transparent 9deg 16deg,
      rgba(255,225,180,.05) 17deg 18deg, transparent 19deg);
    mask:radial-gradient(circle, #000 0 36%, transparent 60%);-webkit-mask:radial-gradient(circle,#000 0 36%,transparent 60%);
    animation:spin 90s linear infinite;opacity:.7}
  @keyframes lampPulse{0%,100%{opacity:.92;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.05)}}
  @keyframes spin{to{transform:translateX(-50%) rotate(360deg)}}

  /* three silhouettes around the table */
  .crew{position:absolute;left:0;right:0;bottom:26%;height:42%;z-index:3;display:flex;align-items:flex-end;justify-content:center;gap:7vw;
    filter:drop-shadow(0 0 24px rgba(255,170,80,.10))}
  .fig{position:relative;background:linear-gradient(180deg,#1a120c,#0b0706);border-radius:48% 48% 12% 12%/60% 60% 12% 12%;
    box-shadow:inset 6px 0 18px rgba(255,170,90,.10), inset -10px 0 22px rgba(0,0,0,.5)}
  .fig::before{content:"";position:absolute;top:-46%;left:50%;width:58%;padding-bottom:58%;transform:translateX(-50%);
    background:linear-gradient(180deg,#1a120c,#0b0706);border-radius:50%;
    box-shadow:inset 6px 2px 16px rgba(255,170,90,.12), inset -8px 0 18px rgba(0,0,0,.5)}
  .fig.left{width:15vw;height:70%}
  .fig.mid{width:14vw;height:60%;opacity:.96}
  .fig.right{width:20vw;height:96%;z-index:5;background:linear-gradient(180deg,#120c08,#060403)}
  .fig.right{margin-left:2vw}
  @media(max-width:760px){.crew{gap:3vw}.fig.left{width:24vw}.fig.mid{width:22vw}.fig.right{width:30vw}}

  /* candle */
  .candle{position:absolute;left:40%;bottom:30%;z-index:4;width:14px;height:50px;border-radius:4px;
    background:linear-gradient(180deg,#fff7e6,#e9d3a8);box-shadow:0 0 2px #000}
  .flame{position:absolute;left:50%;top:-26px;width:14px;height:30px;transform:translateX(-50%);
    background:radial-gradient(circle at 50% 70%, #fff 0%, #ffd36b 30%, #ff8a1f 60%, rgba(255,90,20,0) 75%);
    border-radius:50% 50% 50% 50%/60% 60% 40% 40%;animation:flame .18s ease-in-out infinite alternate;
    filter:blur(.4px)}
  .candleglow{position:absolute;left:calc(40% - 90px);bottom:calc(30% - 40px);width:230px;height:230px;z-index:3;
    background:radial-gradient(circle, rgba(255,180,90,.5) 0%, rgba(255,150,50,.18) 35%, transparent 65%);
    animation:flicker 2.6s ease-in-out infinite}
  @keyframes flame{0%{transform:translateX(-50%) scaleY(1) skewX(-3deg);opacity:.92}100%{transform:translateX(-51%) scaleY(1.12) skewX(3deg);opacity:1}}
  @keyframes flicker{0%,100%{opacity:.85;transform:scale(1)}45%{opacity:1;transform:scale(1.06)}70%{opacity:.78;transform:scale(.98)}}

  /* drifting bokeh (wine/glass highlights) */
  .bokeh{position:absolute;inset:0;z-index:4;pointer-events:none}
  .bokeh i{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,210,150,.9),rgba(255,170,90,0) 70%);
    opacity:.0;animation:rise linear infinite}
  @keyframes rise{0%{opacity:0;transform:translateY(20px) scale(.7)}15%{opacity:.7}100%{opacity:0;transform:translateY(-160px) scale(1.2)}}

  .vignette{position:absolute;inset:0;z-index:6;pointer-events:none;
    background:radial-gradient(120% 100% at 50% 45%, transparent 50%, rgba(0,0,0,.55) 100%)}

  /* ---- centered content ---- */
  .content{position:relative;z-index:10;text-align:center;padding:24px;
    animation:fadeUp 1s ease both;display:flex;flex-direction:column;align-items:center;gap:18px}
  .content::before{content:"";position:absolute;inset:-36px -48px;z-index:-1;border-radius:34px;
    background:radial-gradient(62% 62% at 50% 46%, rgba(7,6,10,.66), rgba(7,6,10,.28) 60%, rgba(7,6,10,0) 80%);
    opacity:0;transition:opacity 1s ease}
  body.has-photo .content::before{opacity:1}
  .kicker{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:var(--warm);opacity:.85;font-weight:700}
  h1{font-size:clamp(40px,9vw,92px);line-height:.96;font-weight:800;letter-spacing:1px;
    background:linear-gradient(180deg,#fff7ea,#ffc987 55%,#ff8a1f);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 40px rgba(255,150,50,.25);filter:drop-shadow(0 6px 24px rgba(0,0,0,.5))}
  .sub{font-size:clamp(13px,2.4vw,17px);color:#e7d4ba;opacity:.9;max-width:560px;line-height:1.5}

  /* loading pie */
  .pie{margin:6px 0 2px}
  .pie svg{filter:drop-shadow(0 8px 26px rgba(0,0,0,.55))}
  .pie path{opacity:.12;transform-box:fill-box;transform-origin:center;animation:pieCycle 4.2s ease-in-out infinite}
  .loadtx{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--warm);opacity:.7;font-weight:700}
  @keyframes pieCycle{0%,8%{opacity:.12}20%,72%{opacity:1}90%,100%{opacity:.12}}

  /* play button */
  .play{position:relative;margin-top:6px;border:none;cursor:pointer;text-decoration:none;
    display:inline-flex;align-items:center;gap:12px;
    padding:18px 34px;border-radius:999px;font-size:clamp(16px,2.6vw,21px);font-weight:800;letter-spacing:.4px;
    color:#1c1206;background:linear-gradient(180deg,#ffd083,#ff9a2e 60%,#ff7a16);
    box-shadow:0 10px 30px rgba(255,130,40,.45), inset 0 1px 0 rgba(255,255,255,.5);
    animation:btnPulse 2.6s ease-in-out infinite;transition:transform .15s ease, box-shadow .2s}
  .play:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 16px 44px rgba(255,140,50,.6), inset 0 1px 0 rgba(255,255,255,.6)}
  .play:active{transform:translateY(0) scale(.99)}
  .play .tri{display:inline-grid;place-items:center;width:26px;height:26px}
  .play .arrow{transition:transform .2s}
  .play:hover .arrow{transform:translateX(4px)}
  @keyframes btnPulse{0%,100%{box-shadow:0 10px 30px rgba(255,130,40,.40), 0 0 0 0 rgba(255,170,80,.45), inset 0 1px 0 rgba(255,255,255,.5)}
    50%{box-shadow:0 12px 34px rgba(255,130,40,.55), 0 0 0 16px rgba(255,170,80,0), inset 0 1px 0 rgba(255,255,255,.6)}}

  .lang{position:fixed;top:18px;right:18px;z-index:20;display:flex;gap:0;border:1px solid rgba(255,200,140,.3);border-radius:999px;overflow:hidden;backdrop-filter:blur(4px)}
  .lang button{cursor:pointer;border:none;background:transparent;color:#e7d4ba;padding:7px 13px;font-size:13px;font-weight:700}
  .lang button.on{background:linear-gradient(180deg,#ffb24d,#ff8a1f);color:#1c1206}

  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){*{animation:none !important}}
</style>
</head>
<body>
  <div class="lang" id="lang"><button data-l="en" class="on">EN</button><button data-l="nl">NL</button></div>

  <div class="stage">
    <!-- real photo if present; otherwise removed and the art scene shows -->
    <img id="hero" alt="" src="triamigos.jpg"
         onload="document.body.classList.add('has-photo')" onerror="this.remove()" />

    <div class="scene">
      <div class="lamp"></div>
      <div class="rays"></div>
      <div class="candleglow"></div>
      <div class="crew"><div class="fig left"></div><div class="fig mid"></div><div class="fig right"></div></div>
      <div class="candle"><div class="flame"></div></div>
      <div class="table"></div>
      <div class="bokeh" id="bokeh"></div>
    </div>
    <div class="vignette"></div>

    <div class="content">
      <div class="kicker" id="kicker">The Trivial Pursuit of a Startup Idea</div>
      <h1>The TriAmigos</h1>
      <p class="sub" id="sub">Three complementary minds, one candlelit table, six wedges to complete. Find the AI-first idea worth building.</p>

      <div class="pie">
        <svg id="loaderPie" width="92" height="92" viewBox="0 0 92 92"></svg>
      </div>
      <div class="loadtx" id="loadtx">Ready when you are</div>

      <a class="play" id="play" href="game">
        <span class="tri">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7z" fill="#1c1206"/></svg>
        </span>
        <span id="playLabel">Play The TriAmigos</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>

<script>
  // build animated six-wedge loader pie (the game's motif)
  const HEX=["#1f7ae0","#e85aa0","#2fab63","#f2b705","#8a5a3c","#f2792b"];
  function pp(cx,cy,r,a,b){const A=(a-90)*Math.PI/180,B=(b-90)*Math.PI/180;
    return `M${cx},${cy} L${cx+r*Math.cos(A)},${cy+r*Math.sin(A)} A${r},${r} 0 0 1 ${cx+r*Math.cos(B)},${cy+r*Math.sin(B)} Z`;}
  const svg=document.getElementById("loaderPie");
  let h="";HEX.forEach((c,i)=>{h+=`<path d="${pp(46,46,43,i*60,(i+1)*60)}" fill="${c}" stroke="#07060a" stroke-width="2" style="animation-delay:${i*0.18}s"></path>`;});
  h+=`<circle cx="46" cy="46" r="9" fill="#07060a"/>`;svg.innerHTML=h;

  // drifting bokeh particles
  const bk=document.getElementById("bokeh");
  for(let i=0;i<14;i++){const s=8+Math.random()*26;const e=document.createElement("i");
    e.style.width=e.style.height=s+"px";e.style.left=(8+Math.random()*84)+"%";e.style.bottom=(18+Math.random()*30)+"%";
    e.style.animationDuration=(6+Math.random()*7)+"s";e.style.animationDelay=(-Math.random()*8)+"s";bk.appendChild(e);}

  // mini language toggle (carries lang into the game)
  const T={en:{kicker:"The Trivial Pursuit of a Startup Idea",
      sub:"Three complementary minds, one candlelit table, six wedges to complete. Find the AI-first idea worth building.",
      load:"Ready when you are", play:"Play The TriAmigos"},
    nl:{kicker:"De Trivial Pursuit van een Startup-idee",
      sub:"Drie complementaire geesten, één tafel bij kaarslicht, zes taartpunten om te vervolledigen. Vind het AI-first idee dat het bouwen waard is.",
      load:"Klaar wanneer jij het bent", play:"Speel The TriAmigos"}};
  let lang="en";
  try{const st=JSON.parse(localStorage.getItem("tp_startup_game_v1"));if(st&&st.lang)lang=st.lang;}catch(e){}
  function applyLang(l){lang=l;const t=T[l];
    document.getElementById("kicker").textContent=t.kicker;
    document.getElementById("sub").textContent=t.sub;
    document.getElementById("loadtx").textContent=t.load;
    document.getElementById("playLabel").textContent=t.play;
    document.documentElement.lang=l;
    document.querySelectorAll("#lang button").forEach(b=>b.classList.toggle("on",b.dataset.l===l));
    // persist choice so the game opens in the same language
    try{const st=JSON.parse(localStorage.getItem("tp_startup_game_v1"))||{};st.lang=l;localStorage.setItem("tp_startup_game_v1",JSON.stringify(st));}catch(e){}
  }
  document.querySelectorAll("#lang button").forEach(b=>b.onclick=()=>applyLang(b.dataset.l));
  applyLang(lang);
</script>
</body>
</html>
